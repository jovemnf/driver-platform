events {}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://frontend:5173;
    }

    location /api/ {
      proxy_pass http://api:3000/;
    }

    location /ia/ {
      proxy_pass http://ai:3001/;
    }

    location /features/ {
      proxy_pass http://feature-store:3002/;
    }
  }
}
